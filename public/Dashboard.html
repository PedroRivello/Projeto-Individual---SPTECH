<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./css/estiloDash.css">
</head>

<body>

    <script>

        if (sessionStorage.ID_USUARIO == undefined) {

            alert("Faça login para acessar a dashboard");

            window.location = "./login.html";

        }

    </script>

    <div class="header">

        <div class="containerHeader">

            <div class="logo-area">

                <img src="./assets/imgs/Logo-gamesPerfilColor.png">

                <h2 class="titulo">
                    Perfil <span>Games</span>
                </h2>

            </div>

            <ul class="navbar">

                <li><a href="./index.html">Inicial</a></li>

                <li class="pipe">|</li>

                <li><a href="./Quiz.html">Quiz</a></li>

                <li class="pipe">|</li>

                <li><a href="./dashboard.html">Dashboard</a></li>

            </ul>

        </div>

    </div>


    <div class="dashboard">

        <div class="cards-dashboard">

            <div class="card-info">

                <h2 id="usuariosPerfil">0</h2>

                <p>Usuários com o seu perfil</p>

            </div>

            <div class="card-info">

                <h2 id="quizRespondidos">0</h2>

                <p>Quizzes respondidos</p>

            </div>

            <div class="card-info">

                <h2 id="perfilEscolhido">-</h2>

                <p>Perfil mais escolhido</p>

            </div>

            <div class="card-info">

                <h2 id="jogoRecomendado">-</h2>

                <p>Jogo mais recomendado</p>

            </div>

        </div>

        <div class="grafico-area">

            <div class="grafico-card">

                <h2>Perfis Gamers</h2>

                <canvas id="graficoPerfis"></canvas>

            </div>

        </div>

    </div>

</body>

</html>

<script>

    let graficoPizza;

    window.onload = function () {

        buscarDadosDashboard();

    }


    function buscarDadosDashboard() {

        fetch("/quiz/dashboard")

            .then(function (resposta) {

                if (resposta.ok) {

                    resposta.json().then(function (dados) {

                        console.log("DADOS DA DASH:");
                        console.log(dados);

                        carregarCards(dados);

                        plotarGrafico(dados);

                    });

                } else {

                    console.log("Erro ao buscar dados");

                }

            })

            .catch(function (erro) {

                console.log(erro);

            });

    }

    function carregarCards(dados) {

        let totalQuiz = 0;
        let perfilMaisEscolhido = "";
        let maiorQtd = 0;
        let jogoMaisRecomendado = "";

        // Perfil do usuário logado (salvo no sessionStorage pelo quiz)

        let perfilDoUsuario = sessionStorage.getItem("perfilQuiz");
        let qtdMeuPerfil = 0;

        for (let i = 0; i < dados.length; i++) {

            let qtd = Number(dados[i].quantidade);
            totalQuiz += qtd;

            // Perfil mais popular geral

            if (qtd > maiorQtd) {
                maiorQtd = qtd;
                perfilMaisEscolhido = dados[i].nomePerfil;
            }

            // Quantidade de usuários com o MESMO perfil do usuário logado

            if (dados[i].nomePerfil === perfilDoUsuario) {
                qtdMeuPerfil = qtd;
            }
        }

        const mapaJogos = {
            competitivo: "Valorant",
            explorador: "Minecraft",
            historia: "God of War",
            criativo: "Roblox"
        };

        jogoMaisRecomendado = mapaJogos[perfilMaisEscolhido] || "-";

        document.getElementById("usuariosPerfil").innerHTML = qtdMeuPerfil;
        document.getElementById("quizRespondidos").innerHTML = totalQuiz;
        document.getElementById("perfilEscolhido").innerHTML = perfilMaisEscolhido;
        document.getElementById("jogoRecomendado").innerHTML = jogoMaisRecomendado;
    }

    function plotarGrafico(dados) {

        let labels = [];

        let valores = [];

        for (let i = 0; i < dados.length; i++) {

            labels.push(dados[i].nomePerfil);

            valores.push(Number(dados[i].quantidade));

        }

        const ctx = document.getElementById('graficoPerfis');

        graficoPizza = new Chart(ctx, {

            type: 'pie',

            data: {

                labels: labels,

                datasets: [{

                    data: valores,

                    backgroundColor: [

                        '#e20606',
                        '#f5e507',
                        '#0964ec',
                        '#5a189a',
                        '#168a07'

                    ],

                    borderWidth: 2

                }]

            },

            options: {

                responsive: true,

                plugins: {

                    legend: {

                        labels: {

                            color: 'white',

                            font: {

                                size: 14

                            }

                        }

                    }

                }

            }

        });

    }

</script>

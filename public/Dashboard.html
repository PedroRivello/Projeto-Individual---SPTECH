<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./css/estiloDash.css">
</head>

<body>

    <!-- HEADER -->

    <div class="header">

        <div class="containerHeader">

            <div class="logo-area">

                <img src="./assets/imgs/Logo-gamesPerfilColor.png">

                <h2 class="titulo">
                    Perfil <span>Games</span>
                </h2>

            </div>

            <ul class="navbar">

                <li><a href="../index.html">Inicial</a></li>
                <li class="pipe">|</li>

                <li><a href="./Quiz.html">Quiz</a></li>
                <li class="pipe">|</li>

                <li><a href="./dashboard.html">Dashboard</a></li>


            </ul>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div class="dashboard">

        <div class="cards-dashboard">

            <div class="card-info">

                <h2>120</h2>

                <p>Usuários com o seu perfil</p>

            </div>

            <div class="card-info">

                <h2>340</h2>

                <p>Quizzes respondidos</p>

            </div>

            <div class="card-info">

                <h2>Competitivo</h2>

                <p>Perfil escolhido</p>

            </div>

            <div class="card-info">

                <h2>Valorant</h2>

                <p>Jogo mais recomendado</p>

            </div>

        </div>

        <div class="grafico-area">
            <div class="grafico-card">
                <h2>Perfis Gamers</h2>
                <canvas id="graficoPerfis"></canvas>

            </div>
        </div>
    </div>

    <script>

        const ctx = document.getElementById('graficoPerfis');

        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: [
                    'Competitivo',
                    'História',
                    'Casual',
                    'Multiplayer',
                    'RPG'
                ],
                datasets: [{
                    data: [40, 25, 15, 12, 8],
                    backgroundColor: [
                        '#e20606',
                        '#f5e507',
                        '#0964ec',
                        '#5a189a',
                        '#168a07'
                    ],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white',
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });

    </script>

</body>

</html>

  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <!--header inicio-->
  <div class="header">
    <div class="container">

      <div class="logo-area">
        <img src="./assets/imgs/Logo-gamesPerfilColor.png">

        <h2 class="titulo">
          Perfil <span>Games</span>
        </h2>
      </div>
      <ul class="navbar">
        <li>
          <a href="./index.html">Inicial</a>
        </li>
        <li class="pipe">|</li>
        <li>
          <a href="./simulador.html">Simulador</a>
        </li>
        <li class="pipe">|</li>
        <li>
          <a href="./cadastro.html">Cadastro</a>
        </li>
      </ul>
      <a href="./login.html" class="btn-header">
        Entrar
      </a>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card-cadastro">
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">

      </div>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>

<script>

  let Usuarios_Cadastrados = [];

  function cadastrar() {

    var nomeVar = document.getElementById("nome_input").value;
    var emailVar = document.getElementById("email_input").value;
    var senhaVar = document.getElementById("senha_input").value;
    var confirmacaoSenhaVar = document.getElementById("confirmacao_senha_input").value;
    var idUsuarioVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    }
    if (!emailVar.includes("@") || !emailVar.includes(".")) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Email precisa de @ e .)";

      finalizarAguardar();
      return false;
    }
    if (senhaVar.length < 6) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Senha Fraca! necessita ter mais de 6 caracteres)";

      finalizarAguardar();
      return false;
    }
    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "(Confirmação de senha errada)";

      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }
    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: document.getElementById("nome_input").value,
        emailServer: document.getElementById("email_input").value,
        senhaServer: document.getElementById("senha_input").value,
        fkPerfilResultadoServer: sessionStorage.getItem("idPerfilQuiz")
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }
  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
